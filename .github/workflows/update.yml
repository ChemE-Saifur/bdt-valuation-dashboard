name: Update BDT Valuation Dashboard

on:
  schedule:
    # Runs every Sunday at 03:00 UTC, which is 09:00 AM Bangladesh time
    - cron: "0 3 * * 0"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run dashboard update script
        run: python update_dashboard.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add index.html

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Weekly update of BDT valuation dashboard"
            git push
          fi
